    // Direct object-to-primitive sanitization guards
    const sanitizeString = (val, fallback = "") => {
      if (val === null || val === undefined) return fallback;
      if (typeof val === 'object') {
        if (Object.keys(val).length === 0) return fallback;
        return val.name || val.url || JSON.stringify(val);
      }
      return String(val);
    };

    const sanitizeNumber = (val, fallback = 0) => {
      if (val === null || val === undefined) return fallback;
      if (typeof val === 'object') return fallback;
      const num = Number(val);
      return isNaN(num) ? fallback : num;
    };

    function TeamLogo({ value, fallbackEmoji = "⚔️", className = "w-16 h-16 object-contain" }) {
      const [imgFailed, setImgFailed] = React.useState(false);

      // Reset error state if a brand new logo value is selected or synced
      React.useEffect(() => {
        setImgFailed(false);
      }, [value]);

      const cleanUrl = sanitizeString(value).trim();
      if (!cleanUrl || imgFailed) {
        return <span className="text-5xl select-none">{fallbackEmoji}</span>;
      }
      const isUrl = cleanUrl.startsWith('http://') || cleanUrl.startsWith('https://') || cleanUrl.startsWith('data:image/');
      if (isUrl) {
        return (
          <div className={`${className} flex items-center justify-center overflow-hidden bg-white/70 border-2 border-slate-700 rounded-2xl p-2`}>
            <img 
              src={cleanUrl} 
              alt="Team Badge" 
              className="max-w-full max-h-full object-contain"
              onError={() => setImgFailed(true)}
            />
          </div>
        );
      }
      return <span className="text-5xl select-none">{cleanUrl}</span>;
    }

      const [gameState, setGameState] = useState({
        sport: 'Basketball',

        teamAScore: 0,

        isShotClockRunning: false,

        activeSoundId: 'none'  
      });

      const [displayTime, setDisplayTime] = useState(600);

      useEffect(() => {

      useEffect(() => {

      const playSynthesizedSound = (soundId) => {
        try {
          const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
          
          if (soundId === 'horn') {
            const osc1 = audioCtx.createOscillator();
            const osc2 = audioCtx.createOscillator();
            const osc3 = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            osc1.type = 'sawtooth';
            osc1.frequency.setValueAtTime(105, audioCtx.currentTime);
            osc2.type = 'square';
            osc2.frequency.setValueAtTime(110, audioCtx.currentTime);
            osc3.type = 'sawtooth';
            osc3.frequency.setValueAtTime(160, audioCtx.currentTime);
            
            const filter = audioCtx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(800, audioCtx.currentTime);
            
            gainNode.gain.setValueAtTime(0.35, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1.8);
            
            osc1.connect(filter);
            osc2.connect(filter);
            osc3.connect(filter);
            filter.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            osc1.start(); osc2.start(); osc3.start();
            osc1.stop(audioCtx.currentTime + 1.8);
            osc2.stop(audioCtx.currentTime + 1.8);
            osc3.stop(audioCtx.currentTime + 1.8);
          } 
          else if (soundId === 'airhorn') {
            const playBlast = (startOffset, duration) => {
              const osc1 = audioCtx.createOscillator();
              const osc2 = audioCtx.createOscillator();
              const gainNode = audioCtx.createGain();
              
              osc1.type = 'sawtooth';
              osc1.frequency.setValueAtTime(320, audioCtx.currentTime + startOffset);
              osc2.type = 'sawtooth';
              osc2.frequency.setValueAtTime(324, audioCtx.currentTime + startOffset);
              
              gainNode.gain.setValueAtTime(0, audioCtx.currentTime + startOffset);
              gainNode.gain.linearRampToValueAtTime(0.3, audioCtx.currentTime + startOffset + 0.05);
              gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + startOffset + duration);
              
              osc1.connect(gainNode);
              osc2.connect(gainNode);
              gainNode.connect(audioCtx.destination);
              
              osc1.start(audioCtx.currentTime + startOffset);
              osc2.start(audioCtx.currentTime + startOffset);
              osc1.stop(audioCtx.currentTime + startOffset + duration);
              osc2.stop(audioCtx.currentTime + startOffset + duration);
            };
            
            playBlast(0, 0.6);
            playBlast(0.7, 0.9);
          } 
          else if (soundId === 'charge') {
            const playNote = (freq, startOffset, duration) => {
              const osc = audioCtx.createOscillator();
              const gain = audioCtx.createGain();
              osc.type = 'triangle'; 
              osc.frequency.setValueAtTime(freq, audioCtx.currentTime + startOffset);
              gain.gain.setValueAtTime(0, audioCtx.currentTime + startOffset);
              gain.gain.linearRampToValueAtTime(0.2, audioCtx.currentTime + startOffset + 0.02);
              gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + startOffset + duration);
              
              osc.connect(gain);
              gain.connect(audioCtx.destination);
              
              osc.start(audioCtx.currentTime + startOffset);
              osc.stop(audioCtx.currentTime + startOffset + duration);
            };
            
            playNote(392, 0, 0.15);     
            playNote(523, 0.18, 0.15);  
            playNote(659, 0.36, 0.15);  
            playNote(784, 0.54, 0.25);  
            playNote(659, 0.85, 0.15);  
            playNote(784, 1.05, 0.6);   
          } 
          else if (soundId === 'letsgo') {
            const playTone = (freq, startOffset, duration) => {
              const osc = audioCtx.createOscillator();
              const gain = audioCtx.createGain();
              osc.type = 'triangle';
              osc.frequency.setValueAtTime(freq, audioCtx.currentTime + startOffset);
              
              gain.gain.setValueAtTime(0, audioCtx.currentTime + startOffset);
              gain.gain.linearRampToValueAtTime(0.2, audioCtx.currentTime + startOffset + 0.02);
              gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + startOffset + duration);
              
              osc.connect(gain);
              gain.connect(audioCtx.destination);
              osc.start(audioCtx.currentTime + startOffset);
              osc.stop(audioCtx.currentTime + startOffset + duration);
            };
            playTone(523, 0, 0.15); 
            playTone(523, 0.2, 0.15);
            playTone(587, 0.4, 0.15); 
            playTone(659, 0.6, 0.15); 
            playTone(587, 0.8, 0.15);
            playTone(659, 1.0, 0.4); 
          }
          else if (soundId === 'sad') {
            const playSlide = (freqStart, freqEnd, startOffset, duration) => {
              const osc = audioCtx.createOscillator();
              const gain = audioCtx.createGain();
              osc.type = 'sawtooth';
              osc.frequency.setValueAtTime(freqStart, audioCtx.currentTime + startOffset);
              osc.frequency.linearRampToValueAtTime(freqEnd, audioCtx.currentTime + startOffset + duration);

              const filter = audioCtx.createBiquadFilter();
              filter.type = 'lowpass';
              filter.frequency.setValueAtTime(400, audioCtx.currentTime + startOffset);

              gain.gain.setValueAtTime(0, audioCtx.currentTime + startOffset);
              gain.gain.linearRampToValueAtTime(0.15, audioCtx.currentTime + startOffset + 0.05);
              gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + startOffset + duration);

              osc.connect(filter);
              filter.connect(gain);
              gain.connect(audioCtx.destination);

              osc.start(audioCtx.currentTime + startOffset);
              osc.stop(audioCtx.currentTime + startOffset + duration);
            };
            playSlide(220, 180, 0, 0.4);
            playSlide(200, 165, 0.45, 0.4);
            playSlide(180, 150, 0.9, 0.4);
            playSlide(150, 110, 1.35, 0.9); 
          }
        } catch (synthErr) {
          console.error("Synthesizer sound effect playback crashed:", synthErr);
        }

      const triggerSoundboardSound = (soundId) => {

      // Authenticate with Firebase on Load
      useEffect(() => {

        const runAuth = async () => {

      useEffect(() => {

            setImportSuccess(true);
            setTimeout(() => setImportSuccess(false), 5000);

      const handleSaveFirebaseConfig = () => {

                <div className="mt-3 p-4 bg-amber-955/5 border border-amber-800/30 rounded-xl space-y-4 animate-fadeIn">

                      <Icon name="link" className="absolute left-3 top-2.5 w-4 h-4 text-amber-800" />
                      <input 
                        type="text"

                        onChange={(e) => setApiEndpoint(e.target.value)}
                        className="w-full bg-white border border-amber-800 rounded-lg py-1.5 pl-9 pr-3 text-slate-700 text-xs font-mono tracking-wide focus:outline-none focus:border-amber-955 transition-colors"

                  <div className="space-y-1.5">
                    <label className="text-[10px] uppercase font-bold text-slate-700">Custom Sanctuary Config (JSON)</label>
                    <textarea

                    />

              <div className="grid grid-cols-[minmax(0,1.2fr)_auto_minmax(0,1.2fr)] gap-8 items-center flex-grow h-full max-h-[85vh] py-2 overflow-hidden">
                
                {/* Home Team Panel (Crimson Knights Keep) */}
                <div className="h-full flex flex-col justify-center items-center p-8 bg-white/60 border-4 border-red-905 rounded-3xl banner-shadow min-w-0 relative">
                  <div className="absolute -top-1 left-1/2 transform -translate-x-1/2 -translate-y-1/2 bg-red-900 text-white text-[11px] font-medieval px-4 py-1 rounded-full uppercase tracking-widest border border-amber-500 shadow-md">
                    Home
                  </div>
                  
                  <TeamLogo value={gameState.teamALogo} fallbackEmoji="🛡️" className="w-[clamp(4.5rem,20vh,13rem)] h-[clamp(4.5rem,20vh,13rem)]" />
                  
                  <h2 className="mt-4 text-[clamp(1.2rem,3.2vh,2.5rem)] font-royal font-black uppercase tracking-wide text-red-955 text-center break-words whitespace-normal w-full px-2 leading-none">
                    {sanitizeString(gameState.teamAName)}
                  </h2>
                  
                  {/* Huge high-contrast score */}
                  <div className="text-[clamp(4.5rem,30vh,15rem)] font-black font-digital glowing-crimson select-none leading-none mt-2">
                    {sanitizeNumber(gameState.teamAScore)}
                  </div>
                </div>

                {/* Center Game Clock Section */}
                <div className="flex flex-col justify-center items-center px-4 py-4 space-y-8 text-center flex-shrink-0">
                  
                  {/* Period Quarter indicator */}
                  <div className="flex flex-col items-center">
                    <span className="text-amber-900 font-medieval text-[clamp(0.9rem,2.2vh,1.6rem)] font-black uppercase tracking-widest bg-amber-900/10 px-5 py-1 rounded-full border border-amber-800/35">
                      {sanitizeString(gameState.periodName)}
                    </span>
                    <span className="text-[clamp(3rem,11vh,6.5rem)] font-black font-digital text-stone-900 leading-none mt-3 select-none">
                      {sanitizeNumber(gameState.period)}
                    </span>
                  </div>

                  {/* BIG CLOCK DISPLAY (Medieval Iron Frame) */}
                  {!isVolleyball && (
                    <div className="space-y-4 w-full flex flex-col items-center">
                      <div className="text-[clamp(3.5rem,12vh,8rem)] font-black font-digital tracking-wide glowing-amber-glow select-none bg-stone-950 border-4 border-amber-800 py-4 px-12 rounded-3xl banner-shadow leading-none inline-block whitespace-nowrap">
                        {formatTime(displayTime)}
                      </div>
                      {gameState.isTimerRunning && (
                        <div className="flex items-center justify-center text-emerald-800 gap-1.5 text-xs font-medieval font-black animate-pulse">
                          <Icon name="swords" className="w-4 h-4 text-emerald-700" />
                          <span>COMBAT UNDERWAY</span>
                        </div>
                      )}
                    </div>
                  )}
                </div>

                {/* Away Team Panel (Blue Kingdom) */}
                <div className="h-full flex flex-col justify-center items-center p-8 bg-white/60 border-4 border-blue-900 rounded-3xl banner-shadow min-w-0 relative">
                  <div className="absolute -top-1 left-1/2 transform -translate-x-1/2 -translate-y-1/2 bg-blue-900 text-white text-[11px] font-medieval px-4 py-1 rounded-full uppercase tracking-widest border border-amber-500 shadow-md">
                    Away
                  </div>
                  
                  <TeamLogo value={gameState.teamBLogo} fallbackEmoji="🔥" className="w-[clamp(4.5rem,20vh,13rem)] h-[clamp(4.5rem,20vh,13rem)]" />
                  
                  <h2 className="mt-4 text-[clamp(1.2rem,3.2vh,2.5rem)] font-royal font-black uppercase tracking-wide text-blue-955 text-center break-words whitespace-normal w-full px-2 leading-none">
                    {sanitizeString(gameState.teamBName)}
                  </h2>
                  
                  {/* Huge high-contrast score */}
                  <div className="text-[clamp(4.5rem,30vh,15rem)] font-black font-digital glowing-royal-blue select-none leading-none mt-2">
                    {sanitizeNumber(gameState.teamBScore)}
                  </div>
                </div>

              </div>
            )}

            {/* Footer with Knights Branding */}
            <div className="flex justify-between items-center text-amber-900/60 font-medieval text-xs pt-4 border-t border-amber-800/20">
              <span>Court Duel Protocol</span>
              <div className="flex items-center gap-1">
                <Icon name="shield" className="w-4 h-4" />
                <span className="font-bold">Winchester Knights</span>
              </div>
              <span>Anno Domini 2026</span>
            </div>

          </div>
        );
      }
    }

    // Render application instance
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
