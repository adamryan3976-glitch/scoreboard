          </svg>

        'cloud-upload': (

      return icons[name] || null;
    }

    // Direct object-to-primitive sanitization guards to completely fix React Error #31
    const sanitizeString = (val, fallback = "") => {
      if (val === null || val === undefined) return fallback;
      if (typeof val === 'object') {
        if (Object.keys(val).length === 0) return fallback;
        return val.name || val.url || JSON.stringify(val);
      }
      return String(val);
    };

    const sanitizeNumber = (val, fallback = 0) => {
      if (val === null || val === undefined) return fallback;
      if (typeof val === 'object') return fallback;
      const num = Number(val);
      return isNaN(num) ? fallback : num;
    };

    // Safe component to render either string/emojis or modern dynamic web images
    function TeamLogo({ value, fallbackEmoji = "🏆", className = "w-16 h-16 object-contain" }) {
      const cleanUrl = sanitizeString(value).trim();
      if (!cleanUrl) {
        return <span className="text-5xl select-none">{fallbackEmoji}</span>;
      }
      const isUrl = cleanUrl.startsWith('http://') || cleanUrl.startsWith('https://') || cleanUrl.startsWith('data:image/');
      if (isUrl) {
        return (
          <div className={`${className} flex items-center justify-center overflow-hidden bg-slate-50 border border-slate-200 rounded-2xl p-2`}>
            <img 
              src={cleanUrl} 
              alt="Team Badge" 
              className="max-w-full max-h-full object-contain"
              onError={(e) => {
                // If sheet URL fails, hide broken img box and display fallback placeholder
                e.target.style.display = 'none';
                e.target.parentNode.innerHTML = `<span class="text-4xl select-none">🏆</span>`;
              }}
            />
          </div>
        );
      }
      return <span className="text-5xl select-none">{cleanUrl}</span>;
    }

    function App() {
      // System & Connection States
      const [user, setUser] = useState(null);
      const [viewMode, setViewMode] = useState('lobby'); // 'lobby', 'controller', 'display'
      const [sessionId, setSessionId] = useState('gym-main-court');
      const [errorMsg, setErrorMsg] = useState(null);
      const [hasAuthError, setHasAuthError] = useState(false);
      
      // Google Apps Script API Integration States (Loaded from LocalStorage with default fallback)
      const [apiEndpoint, setApiEndpoint] = useState(() => {
        return localStorage.getItem('scoreboard_api_url') || 'https://script.google.com/macros/s/AKfycbxqR4Q7hZGTQ73XaBbM4eBLII4MDbUWvfoh8iaQuIiKXUFBXxIH4AhW7nxg8zFj0WK_Bw/exec';
      });
      const [importedSchools, setImportedSchools] = useState(DEFAULT_SCHOOLS);
      const [availableSports, setAvailableSports] = useState(DEFAULT_SPORTS);
      const [isImporting, setIsImporting] = useState(false);
      const [importSuccess, setImportSuccess] = useState(false);

      // Local State for custom self-hosted Firebase config string
      const [customFirebaseText, setCustomFirebaseText] = useState(() => {
        return localStorage.getItem('scoreboard_firebase_config') || '';
      });

      // Custom dialog modal states (Replaces raw window alerts/confirms)
      const [confirmModal, setConfirmModal] = useState({ show: false, title: '', message: '', onConfirm: null, isLogging: false });
      
      // Manual Override Score Pop-up States
      const [overrideModal, setOverrideModal] = useState({ show: false, teamA: 0, teamB: 0, period: 1 });

      // Scoreboard Synced State
      const [gameState, setGameState] = useState({
        sport: 'Basketball',
        teamAName: 'Home Raiders',
        teamALogo: '⚡',
        teamAScore: 0,
        teamATimeouts: 3,
        teamBName: 'Away Titans',
        teamBLogo: '🔥',
        teamBScore: 0,
        teamBTimeouts: 3,
        period: 1,
        maxPeriods: 4,
        periodName: 'Quarter',
        timerSeconds: 600,
        timerLength: 600,
        isTimerRunning: false,
        timerLastUpdated: 0,
        shotClock: 24,
        isShotClockRunning: false,
        lastBuzzerTriggered: 0, 
      });

      // Local Display Timer calculation refs
      const [displayTime, setDisplayTime] = useState(600);
      const timerIntervalRef = useRef(null);

      // Save updated API URLs to LocalStorage automatically
      useEffect(() => {
        localStorage.setItem('scoreboard_api_url', apiEndpoint);
      }, [apiEndpoint]);

      // Trigger automatic background synchronization with Google Sheet on app mount
      useEffect(() => {
        if (apiEndpoint) {
          handleImportFromAPI();
        }
      }, []);

      // Synthesize rich Web Audio API fallback to emulate the physical sound profile of Buzzer Sound.mp3
      const playSynthesizedGymBuzzer = () => {
        try {
          const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
          
          // Use multiple detuned raw oscillators for a fat, realistic retro-sounding electronic horn
          const osc1 = audioCtx.createOscillator();
          const osc2 = audioCtx.createOscillator();
          const osc3 = audioCtx.createOscillator();
          const gainNode = audioCtx.createGain();
          
          osc1.type = 'sawtooth';
          osc1.frequency.setValueAtTime(105, audioCtx.currentTime); // Deep resonant low frequency
          
          osc2.type = 'square';
          osc2.frequency.setValueAtTime(110, audioCtx.currentTime); // Strong electronic buzz timbre
          
          osc3.type = 'sawtooth';
          osc3.frequency.setValueAtTime(160, audioCtx.currentTime); // Mid-high frequency overtone
          
          // Gentle envelope filter to shape the buzz attack and trail decay
          const filter = audioCtx.createBiquadFilter();
          filter.type = 'lowpass';
          filter.frequency.setValueAtTime(800, audioCtx.currentTime);
          
          gainNode.gain.setValueAtTime(0.35, audioCtx.currentTime);
          gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1.8); // Natural 1.8s decay
          
          osc1.connect(filter);
          osc2.connect(filter);
          osc3.connect(filter);
          filter.connect(gainNode);
          gainNode.connect(audioCtx.destination);
          
          osc1.start();
          osc2.start();
          osc3.start();
          
          osc1.stop(audioCtx.currentTime + 1.8);
          osc2.stop(audioCtx.currentTime + 1.8);
          osc3.stop(audioCtx.currentTime + 1.8);
        } catch (synthErr) {
          console.error("Synthesizer fallback crashed.", synthErr);
        }
      };

      // Web Audio / File Gym Buzzer Player with dynamic audio source tracking and synthesizer fallback
      const triggerGymBuzzer = () => {
        try {
          const audio = new Audio("Buzzer Sound.mp3");
          
          // Intercept load/playback failures instantly to bypass browser sandbox & file missing errors
          const playPromise = audio.play();
          if (playPromise !== undefined) {
            playPromise.catch(err => {
              console.warn("Local Buzzer Sound.mp3 failed to load/play. Activating dynamic synthesized gym horn fallback...");
              playSynthesizedGymBuzzer();
            });
          }
        } catch (e) {
          console.warn("Absolute failure attempting to load relative HTML5 Audio object. Launching synthesizer core...");
          playSynthesizedGymBuzzer();
        }
      };

      // Authenticate with Firebase on Load (Strict token guarding to avoid auth config errors)
      useEffect(() => {
        if (!usingRealFirebase) {
          setUser({ uid: 'mock-local-user-' + Math.random().toString(36).substr(2, 9) });
          return;
        }

        const runAuth = async () => {
          try {
            // NEVER use custom token if custom Firebase configurations (local storage custom config or your hardcoded personal scoreboard-9b219 config) are running.
            // Custom tokens are generated uniquely by the platform's specific server workspace and will ALWAYS fail on custom user-owned Firebase instances.
            // This prevents the auth/custom-token-mismatch exception cleanly.
            const isLocalCustomConfig = localStorage.getItem('scoreboard_firebase_config');
            const isHardcodedPersonalConfig = firebaseConfig.projectId === "scoreboard-9b219";
            const isPlatformConfig = typeof __firebase_config !== 'undefined' && __firebase_config && !isLocalCustomConfig && !isHardcodedPersonalConfig;
            const hasCustomToken = typeof __initial_auth_token !== 'undefined' && __initial_auth_token;
            
            if (isPlatformConfig && hasCustomToken) {
              await signInWithCustomToken(auth, __initial_auth_token);
            } else {
              await signInAnonymously(auth);
            }
          } catch (e) {
            console.error("Auth Failure Error Caught:", e);
            setHasAuthError(true);
            if (e.code === 'auth/configuration-not-found' || e.message.includes('configuration-not-found')) {
              setErrorMsg("Anonymous Authentication is disabled in your Firebase Console. Follow the guide below to enable it so your devices can sync.");
            } else {
              setErrorMsg("Authentication Error: " + e.message);
            }
          }
        };

        runAuth();
        const unsubscribe = onAuthStateChanged(auth, (usr) => {
          if (usr) {
            setUser(usr);
            setHasAuthError(false);
          }
        });

        return () => unsubscribe();
      }, []);

      // Synchronize States with Firestore
      useEffect(() => {
        if (!user || hasAuthError) return;

        if (!usingRealFirebase) {
          const savedLocal = localStorage.getItem(`scoreboard-${sessionId}`);
          if (savedLocal) {
            try {
              setGameState(JSON.parse(savedLocal));
            } catch (e) {}
          }
          return;
        }

        // Rule 1: Strict collection paths followed precisely
        const sessionDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'sessions', sessionId);

        const unsubscribe = onSnapshot(sessionDocRef, (snapshot) => {
          if (snapshot.exists()) {
            const data = snapshot.data();
            
            // Map out & sanitize snap data to prevent any Firestore schema corruption from crashing views
            const sanitizedSnap = {
              sport: sanitizeString(data.sport, 'Basketball'),
              teamAName: sanitizeString(data.teamAName, 'Home Raiders'),
              teamALogo: sanitizeString(data.teamALogo, '⚡'),
              teamAScore: sanitizeNumber(data.teamAScore, 0),
              teamATimeouts: sanitizeNumber(data.teamATimeouts, 3),
              teamBName: sanitizeString(data.teamBName, 'Away Titans'),
              teamBLogo: sanitizeString(data.teamBLogo, '🔥'),
              teamBScore: sanitizeNumber(data.teamBScore, 0),
              teamBTimeouts: sanitizeNumber(data.teamBTimeouts, 3),
              period: sanitizeNumber(data.period, 1),
              maxPeriods: sanitizeNumber(data.maxPeriods, 4),
              periodName: sanitizeString(data.periodName, 'Quarter'),
              timerSeconds: sanitizeNumber(data.timerSeconds, 600),
              timerLength: sanitizeNumber(data.timerLength, 600),
              isTimerRunning: Boolean(data.isTimerRunning),
              timerLastUpdated: sanitizeNumber(data.timerLastUpdated, 0),
              lastBuzzerTriggered: sanitizeNumber(data.lastBuzzerTriggered, 0),
            };

            setGameState(sanitizedSnap);
            
            if (sanitizedSnap.lastBuzzerTriggered && sanitizedSnap.lastBuzzerTriggered !== gameState.lastBuzzerTriggered) {
              triggerGymBuzzer();
            }
          } else {
            setDoc(sessionDocRef, gameState);
          }
        }, (error) => {
          console.error("Firestore sync error:", error);
          setErrorMsg("Sync connection interrupted. Please reload.");
        });

        return () => unsubscribe();
      }, [user, sessionId, hasAuthError]);

      // Millisecond-accurate local ticking clock handler (Skip ticking entirely if length is 0, like in Volleyball)
      useEffect(() => {
        if (gameState.isTimerRunning && gameState.timerLength > 0) {
          timerIntervalRef.current = setInterval(() => {
            const now = Date.now();
            const elapsedMs = now - gameState.timerLastUpdated;
            const remaining = Math.max(0, gameState.timerSeconds - Math.floor(elapsedMs / 1000));
            setDisplayTime(remaining);

            if (remaining <= 0) {
              triggerGymBuzzer();
              updateGameState({ isTimerRunning: false, timerSeconds: 0 });
            }
          }, 200);
        } else {
          setDisplayTime(gameState.timerSeconds);
          if (timerIntervalRef.current) clearInterval(timerIntervalRef.current);
        }

        return () => {
          if (timerIntervalRef.current) clearInterval(timerIntervalRef.current);
        };
      }, [gameState.isTimerRunning, gameState.timerSeconds, gameState.timerLastUpdated, gameState.timerLength]);

      // Push State changes to Server or LocalStorage
      const updateGameState = async (newFields) => {

        const cleanFields = {};
        Object.keys(newFields).forEach(key => {
          if (typeof newFields[key] === 'string') {
            cleanFields[key] = sanitizeString(newFields[key]);
          } else if (typeof newFields[key] === 'number') {
            cleanFields[key] = sanitizeNumber(newFields[key]);
          } else {
            cleanFields[key] = newFields[key];
          }
        });

        const updated = { ...gameState, ...cleanFields };
        setGameState(updated);

        if (!usingRealFirebase || hasAuthError) {
          localStorage.setItem(`scoreboard-${sessionId}`, JSON.stringify(updated));
          return;
        }

        if (user) {
          const sessionDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'sessions', sessionId);
          try {
            await updateDoc(sessionDocRef, cleanFields);
          } catch (e) {
            console.error("Error writing scoreboard state to Firestore:", e);
          }
        }
      };

      // Import Configuration and Rosters from Google Sheet deployment Web App API
      const handleImportFromAPI = async () => {
        if (!apiEndpoint) return;
        setIsImporting(true);
        setErrorMsg(null);
        setImportSuccess(false);

        try {
          const response = await fetch(`${apiEndpoint}?action=all`);
          if (!response.ok) throw new Error("Could not access Google Apps Script deployment. Check execution authorization.");
          
          const text = await response.text();
          let result;
          try {
            result = JSON.parse(text);
          } catch (parseErr) {
            throw new Error("The Google Apps Script crashed during execution. Please open your Google Sheet, go to Extensions > Apps Script, and run 'doGet' manually to view the error log.");
          }

          if (result.status === "success") {
            let schoolsList = importedSchools;
            if (result.schools && result.schools.length > 0) {
              // Sanitize schools mapping safely and preserve allLogos
              schoolsList = result.schools.map(s => {
                const legacyLogo = sanitizeString(s.logo, "🏆");
                return {
                  name: sanitizeString(s.name, "Unnamed School"),
                  logo: legacyLogo,
                  allLogos: Array.isArray(s.allLogos) && s.allLogos.length > 0
                    ? s.allLogos.map(l => sanitizeString(l))

              setImportedSchools(schoolsList);

            if (result.sports && result.sports.length > 0) {

              setAvailableSports(sportsList);

            // Highly resilient team select initialization using safe-guards to prevent blank dropdown object rendering
            const rawSetupSport = result.setup?.sport;
            const rawSetupHome = result.setup?.homeTeam;
            const rawSetupAway = result.setup?.awayTeam;
            const rawSetupTime = result.setup?.time;

            const sport = sanitizeString(rawSetupSport, gameState.sport);
            const defaultTeamA = sanitizeString(rawSetupHome, schoolsList[0] ? schoolsList[0].name : 'Home Raiders');
            const defaultTeamB = sanitizeString(rawSetupAway, schoolsList[1] ? schoolsList[1].name : 'Away Titans');
            
            const logoA = schoolsList.find(s => s.name === defaultTeamA)?.logo || '⚡';
            const logoB = schoolsList.find(s => s.name === defaultTeamB)?.logo || '🔥';

            updateGameState({
              sport: sport,
              teamAName: defaultTeamA,
              teamALogo: sanitizeString(logoA, '⚡'),
              teamBName: defaultTeamB,
              teamBLogo: sanitizeString(logoB, '🔥'),
              timerSeconds: sanitizeNumber(rawSetupTime, gameState.timerSeconds),
              timerLength: sanitizeNumber(rawSetupTime, gameState.timerLength),
            });

            setImportSuccess(true);
            setTimeout(() => setImportSuccess(false), 5000);
          } else {
            throw new Error(result.message || "API processing failure inside Apps Script.");
          }

          setErrorMsg(err.message || "Failed to contact Sheets API. Ensure it is deployed as 'Anyone' access.");

          setIsImporting(false);

                  value={gameState.teamBName}
                  onChange={(e) => {
                    const sel = importedSchools.find(s => s.name === e.target.value);
                    updateGameState({
                      teamBName: e.target.value,
                      teamBLogo: sel ? sel.logo : '🔥'
                    });
                  }}
                  className="w-full bg-slate-100 border border-slate-200 text-xs py-1.5 px-2 rounded font-bold text-center focus:outline-none text-slate-800"
                >
                  {importedSchools.map((s, idx) => (
                    <option key={idx} value={s.name}>{sanitizeString(s.name)}</option>
                  ))}
                </select>

                {/* Away Logo Selection Menu (Only shown if school has multiple logos) */}
                {schoolBLogos.length > 1 && (
                  <div className="w-full flex flex-col space-y-0.5">
                    <label className="text-[9px] uppercase tracking-wider font-extrabold text-slate-400 text-center">Select Variant Logo</label>
                    <select
                      value={gameState.teamBLogo}
                      onChange={(e) => updateGameState({ teamBLogo: e.target.value })}
                      className="w-full bg-slate-50 border-slate-200 text-[10px] py-1 px-1.5 rounded font-semibold text-center focus:outline-none text-slate-700"
                    >
                      {schoolBLogos.map((logo, idx) => (
                        <option key={idx} value={logo}>Logo option {idx + 1}</option>
                      ))}
                    </select>
                  </div>
                )}

                <div className="text-center relative flex flex-col items-center min-h-[110px] justify-center">
                  <TeamLogo value={gameState.teamBLogo} fallbackEmoji="🔥" className="w-14 h-14" />
                  <div className="text-6xl font-black font-digital text-blue-600 tracking-wider select-none mt-1">{sanitizeNumber(gameState.teamBScore)}</div>
                </div>

                {/* Score Controls */}
                <div className="flex flex-col w-full space-y-1.5">
                  <div className="flex space-x-1.5">
                    <button 
                      onClick={() => updateGameState({ teamBScore: gameState.teamBScore + 1 })}
                      className="flex-1 bg-blue-600 hover:bg-blue-700 text-white py-2.5 rounded-lg text-sm font-black border-b-2 border-blue-800 active:border-b-0 active:mt-0.5"
                    >
                      +1
                    </button>
                    <button 
                      onClick={() => updateGameState({ teamBScore: Math.max(0, gameState.teamBScore - 1) })}
                      className="bg-slate-100 hover:bg-slate-200 px-3 rounded-lg text-sm font-black text-slate-55"
                    >
                      -1
                    </button>
                  </div>
                  
                  {/* Additional point buttons (Only shown if sport supports multiple points e.g. Basketball) */}
                  {!isVolleyball && (
                    <div className="flex space-x-1.5">
                      <button 
                        onClick={() => updateGameState({ teamBScore: gameState.teamBScore + 2 })}
                        className="flex-1 bg-blue-100 hover:bg-blue-200 text-blue-700 py-1.5 rounded-md text-xs font-bold border border-blue-200"
                      >
                        +2
                      </button>
                      <button 
                        onClick={() => updateGameState({ teamBScore: gameState.teamBScore + 3 })}
                        className="flex-1 bg-blue-200 hover:bg-blue-300 text-blue-800 py-1.5 rounded-md text-xs font-bold border border-blue-300"
                      >
                        +3
                      </button>
                    </div>
                  )}
                </div>
              </div>

            </div>

            {/* Central Clock Controls (Only shown if active sport preset has time) */}
            {!isVolleyball && (
              <div className="bg-white border-2 border-slate-900 rounded-xl p-4 flex flex-col items-center space-y-4 shadow-sm animate-slideUp">
                <span className="text-3xs font-black uppercase tracking-widest text-slate-505 font-sans">Match Clock Control</span>

                {/* Display Clock */}
                <div className="text-5xl font-black font-digital tracking-widest text-amber-700 select-none bg-slate-55 py-3 px-8 rounded-xl border border-slate-200">
                  {formatTime(displayTime)}
                </div>

                {/* Start Stop Reset Action Row */}
                <div className="flex w-full space-x-2">
                  <button 
                    onClick={toggleTimer}
                    className={`flex-1 py-3 px-4 rounded-xl font-black flex items-center justify-center space-x-1.5 transition-colors text-sm shadow-md ${gameState.isTimerRunning ? 'bg-red-600 hover:bg-red-700 text-white shadow-red-200' : 'bg-emerald-600 hover:bg-emerald-700 text-white shadow-emerald-200'}`}
                  >
                    <Icon name={gameState.isTimerRunning ? "pause" : "play"} className="w-4 h-4" />
                    <span>{gameState.isTimerRunning ? 'PAUSE CLOCK' : 'START CLOCK'}</span>
                  </button>

                  <button 
                    onClick={resetTimer}
                    className="bg-slate-100 hover:bg-slate-200 p-3 rounded-xl text-slate-600 border border-slate-200 hover:text-slate-800 transition-colors"
                    title="Reset Game Clock"
                  >
                    <Icon name="rotate-ccw" className="w-5 h-5" />
                  </button>
                </div>

                {/* Add / Subtract Minute modifiers */}
                <div className="grid grid-cols-4 gap-1.5 w-full">
                  <button 
                    onClick={() => adjustTimer(60)}
                    className="bg-slate-100 hover:bg-slate-200 text-2xs py-1.5 px-2 rounded-lg font-bold border border-slate-200 text-slate-600"
                  >
                    +1m
                  </button>
                  <button 
                    onClick={() => adjustTimer(-60)}
                    className="bg-slate-100 hover:bg-slate-200 text-2xs py-1.5 px-2 rounded-lg font-bold border border-slate-200 text-slate-600"
                  >
                    -1m
                  </button>
                  <button 
                    onClick={() => adjustTimer(10)}
                    className="bg-slate-100 hover:bg-slate-200 text-2xs py-1.5 px-2 rounded-lg font-bold border border-slate-200 text-slate-600"
                  >
                    +10s
                  </button>
                  <button 
                    onClick={() => adjustTimer(-10)}
                    className="bg-slate-100 hover:bg-slate-200 text-2xs py-1.5 px-2 rounded-lg font-bold border border-slate-200 text-slate-600"
                  >
                    -10s
                  </button>
                </div>
              </div>
            )}

            {/* Quarter / Period Panel */}
            <div className="grid grid-cols-2 gap-4 bg-white border-2 border-slate-900 rounded-xl p-3.5 items-center shadow-sm">
              
              {/* Period control */}
              <div className="flex flex-col items-center space-y-1.5">
                <span className="text-3xs font-black uppercase tracking-widest text-slate-400">{sanitizeString(gameState.periodName)}</span>
                <div className="flex items-center space-x-3 bg-slate-50 px-4 py-1.5 rounded-lg border border-slate-200">
                  <button 
                    onClick={() => updateGameState({ period: Math.max(1, gameState.period - 1) })}
                    className="text-xs text-slate-550 font-bold hover:text-slate-800"
                  >
                    -
                  </button>
                  <span className="text-lg font-black font-digital text-slate-900">{sanitizeNumber(gameState.period)}</span>
                  <button 
                    onClick={() => updateGameState({ period: Math.min(gameState.maxPeriods, gameState.period + 1) })}
                    className="text-xs text-slate-505 font-bold hover:text-slate-800"
                  >
                    +
                  </button>
                </div>
              </div>

              {/* End Game Button */}
              <div className="flex flex-col items-center">
                <button 
                  onClick={() => {
                    setConfirmModal({
                      show: true,
                      title: 'End Match & Save Stats',
                      message: `Are you sure you are ready to conclude the current match? This logs the final score (${gameState.teamAName}: ${gameState.teamAScore} vs ${gameState.teamBName}: ${gameState.teamBScore}) directly to your "Historic Data" Google Sheet tab.`,
                      onConfirm: handleLogGameToAPI,
                      isLogging: false
                    });
                  }}
                  className="w-full bg-emerald-600 hover:bg-emerald-700 text-white border border-emerald-600 py-2.5 px-3 rounded-xl font-black text-xs transition-colors flex items-center justify-center space-x-1.5 shadow-lg shadow-emerald-200"
                >
                  <Icon name="cloud-upload" className="w-3.5 h-3.5" />
                  <span>End Game & Log</span>
                </button>
              </div>

            </div>

            {/* Manual Override Form Dialog Modal */}
            {overrideModal.show && (
              <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                <div className="max-w-sm w-full bg-white border-2 border-slate-900 rounded-2xl p-6 space-y-5 shadow-2xl text-slate-900 animate-scaleUp">
                  <div className="flex items-center space-x-2 text-rose-600">
                    <Icon name="edit" className="w-5 h-5" />
                    <h3 className="text-md font-extrabold uppercase tracking-wide">Manual Scoreboard Override</h3>
                  </div>
                  
                  <div className="space-y-3">
                    <div>
                      <label className="text-3xs uppercase tracking-wide font-black text-slate-550">Home Score ({sanitizeString(gameState.teamAName)})</label>
                      <input 
                        type="number"
                        value={overrideModal.teamA}
                        onChange={(e) => setOverrideModal(prev => ({ ...prev, teamA: e.target.value }))}
                        className="w-full bg-slate-50 border-2 border-slate-200 rounded-xl py-2 px-3 text-sm font-bold focus:outline-none focus:border-rose-600"
                      />
                    </div>

                    <div>
                      <label className="text-3xs uppercase tracking-wide font-black text-slate-555">Away Score ({sanitizeString(gameState.teamBName)})</label>
                      <input 
                        type="number"
                        value={overrideModal.teamB}
                        onChange={(e) => setOverrideModal(prev => ({ ...prev, teamB: e.target.value }))}
                        className="w-full bg-slate-50 border-2 border-slate-200 rounded-xl py-2 px-3 text-sm font-bold focus:outline-none focus:border-rose-600"
                      />
                    </div>

                    <div>
                      <label className="text-3xs uppercase tracking-wide font-black text-slate-555">Current {sanitizeString(gameState.periodName)}</label>
                      <input 
                        type="number"
                        value={overrideModal.period}
                        onChange={(e) => setOverrideModal(prev => ({ ...prev, period: e.target.value }))}
                        className="w-full bg-slate-50 border-2 border-slate-200 rounded-xl py-2 px-3 text-sm font-bold focus:outline-none focus:border-rose-600"
                      />
                    </div>
                  </div>

                  <div className="flex justify-end space-x-2 pt-2">
                    <button 
                      onClick={() => setOverrideModal({ show: false, teamA: 0, teamB: 0, period: 1 })}
                      className="bg-slate-100 hover:bg-slate-200 text-slate-600 py-2 px-4 rounded-lg text-xs font-semibold"
                    >
                      Cancel
                    </button>
                    <button 
                      onClick={handleSaveManualOverrides}
                      className="bg-slate-950 hover:bg-slate-800 text-white py-2 px-4 rounded-lg text-xs font-bold"
                    >
                      Apply Changes
                    </button>
                  </div>
                </div>
              </div>
            )}

            {/* Custom Confirm & Transmit Dialog Modal (Avoids native system alerts) */}
            {confirmModal.show && (
              <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                <div className="max-w-sm w-full bg-white border-2 border-slate-900 rounded-2xl p-6 space-y-5 shadow-2xl text-slate-900">
                  <div className="flex items-center space-x-3 text-emerald-600">
                    <Icon name="database-backup" className="w-6 h-6" />
                    <h3 className="text-md font-extrabold uppercase tracking-wide">{confirmModal.title}</h3>
                  </div>
                  <p className="text-xs text-slate-500 leading-relaxed font-medium">{confirmModal.message}</p>
                  
                  <div className="flex justify-end space-x-2 pt-2">
                    {!confirmModal.isLogging && confirmModal.onConfirm && (
                      <button 
                        onClick={() => setConfirmModal({ show: false, title: '', message: '', onConfirm: null, isLogging: false })}
                        className="bg-slate-100 hover:bg-slate-200 text-slate-55 py-2 px-4 rounded-lg text-xs font-semibold"
                      >
                        Cancel
                      </button>
                    )}
                    {confirmModal.onConfirm ? (
                      <button 
                        onClick={confirmModal.onConfirm}
                        disabled={confirmModal.isLogging}
                        className="bg-emerald-600 hover:bg-emerald-700 disabled:bg-slate-200 py-2 px-4 rounded-lg text-xs font-bold text-white flex items-center space-x-1.5"
                      >
                        {confirmModal.isLogging ? (
                          <>
                            <div className="w-3 h-3 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
                            <span>Logging...</span>
                          </>
                        ) : (
                          <span>Confirm</span>
                        )}
                      </button>
                    ) : (
                      <button 
                        onClick={() => setConfirmModal({ show: false, title: '', message: '', onConfirm: null, isLogging: false })}
                        className="bg-blue-600 hover:bg-blue-700 text-white py-2 px-5 rounded-lg text-xs font-bold"
                      >
                        Close
                      </button>
                    )}
                  </div>
                </div>
              </div>
            )}

          </div>
        );
      }

      // Render DISPLAY Page (Optimized for Wall Projection - Stark White Light Mode)
      if (viewMode === 'display') {
        const isVolleyball = gameState.sport === 'Volleyball' || gameState.timerLength === 0;

        return (
          <div className="h-screen w-screen bg-white text-slate-900 flex flex-col justify-center p-8 overflow-hidden select-none relative no-scrollbar">
            
            {/* Control Panel overlay for exiting display mode (Double tap anywhere or use the top-left trigger) */}
            <div className="absolute top-4 left-4 z-50 opacity-0 hover:opacity-100 transition-opacity">
              <button 
                onClick={() => setViewMode('lobby')}
                className="bg-white hover:bg-slate-100 border-2 border-slate-900 px-3 py-1.5 rounded-lg text-2xs text-slate-900 uppercase tracking-wider font-bold shadow-md"
              >
                Quit Show
              </button>
            </div>

            {/* Middle Main Content Block using auto-sizing CSS Grid to prevent overlap */}
            <div className="grid grid-cols-[minmax(0,1.2fr)_auto_minmax(0,1.2fr)] gap-8 items-center flex-grow h-full max-h-[90vh] py-2 overflow-hidden">
              
              {/* Home Team Panel */}
              <div className="h-full flex flex-col justify-center items-center p-6 bg-slate-50 border-2 border-slate-950 rounded-3xl projector-shadow min-w-0">
                <TeamLogo value={gameState.teamALogo} fallbackEmoji="⚡" className="w-[clamp(4rem,18vh,12rem)] h-[clamp(4rem,18vh,12rem)]" />
                <h2 className="mt-4 text-[clamp(1.1rem,3vh,2.2rem)] font-black uppercase tracking-wide text-slate-900 text-center break-words whitespace-normal w-full px-2 leading-tight">
                  {sanitizeString(gameState.teamAName)}
                </h2>
                
                {/* Score Big Display */}
                <div className="text-[clamp(4rem,28vh,14rem)] font-black font-digital digital-red select-none leading-none mt-2">
                  {sanitizeNumber(gameState.teamAScore)}
                </div>
              </div>

              {/* Center Game Clock Section (Auto-sizes exactly to fit clock box) */}
              <div className="flex flex-col justify-center items-center px-6 py-4 space-y-8 text-center flex-shrink-0">
                
                {/* Period Quarter indicator */}
                <div className="flex flex-col items-center">
                  <span className="text-slate-500 text-[clamp(0.8rem,2vh,1.4rem)] font-black uppercase tracking-widest">
                    {sanitizeString(gameState.periodName)}
                  </span>
                  <span className="text-[clamp(2.5rem,10vh,6rem)] font-black font-digital text-slate-900 leading-none mt-2 select-none">
                    {sanitizeNumber(gameState.period)}
                  </span>
                </div>

                {/* BIG CLOCK DISPLAY */}
                {!isVolleyball && (
                  <div className="space-y-4 w-full flex flex-col items-center">
                    <div className="text-[clamp(3rem,11vh,7.5rem)] font-black font-digital tracking-wide digital-amber select-none bg-slate-100 border-4 border-slate-900 py-4 px-10 rounded-3xl projector-shadow leading-none inline-block whitespace-nowrap">
                      {formatTime(displayTime)}
                    </div>
                    {gameState.isTimerRunning && (
                      <div className="flex items-center justify-center text-emerald-600 gap-1.5 text-xs font-black animate-pulse">
                        <div className="w-2.5 h-2.5 bg-emerald-500 rounded-full"></div>
                        <span>CLOCK ACTIVE</span>
                      </div>
                    )}
                  </div>
                )}
              </div>

              {/* Away Team Panel */}
              <div className="h-full flex flex-col justify-center items-center p-6 bg-slate-50 border-2 border-slate-950 rounded-3xl projector-shadow min-w-0">
                <TeamLogo value={gameState.teamBLogo} fallbackEmoji="🔥" className="w-[clamp(4rem,18vh,12rem)] h-[clamp(4rem,18vh,12rem)]" />
                <h2 className="mt-4 text-[clamp(1.1rem,3vh,2.2rem)] font-black uppercase tracking-wide text-slate-900 text-center break-words whitespace-normal w-full px-2 leading-tight">
                  {sanitizeString(gameState.teamBName)}
                </h2>
                
                {/* Score Big Display */}
                <div className="text-[clamp(4rem,28vh,14rem)] font-black font-digital digital-blue select-none leading-none mt-2">
                  {sanitizeNumber(gameState.teamBScore)}
                </div>
              </div>

            </div>

          </div>
        );
      }
    }

    // Render application instance
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
